# go-llm-agent 配置文件
# 此文件只存非敏感配置，API Key 请写入 .env 或直接设置环境变量

llm:
  # Provider 可选值：openai / zhipu / tongyi / ollama
  provider: openai

  # 模型名称，可被环境变量 LLM_MODEL 覆盖
  model: gpt-4o-mini

  # 自定义端点（留空则使用 provider 的默认地址）
  # 示例（Ollama 本地）：http://localhost:11434/v1
  base_url: ""

  # 生成温度：0.0（最确定）~ 2.0（最随机）
  # 客服场景推荐 0.3~0.5，创意场景可用 0.8~1.2
  temperature: 0.3

  # 单次响应最大 Token 数
  max_tokens: 2048

  # HTTP 请求超时（Go duration 格式）
  timeout: 60s

  # 自动重试次数（针对 429 / 5xx 错误）
  max_retries: 3

  # 最大并发请求数，防止触发 Rate Limit
  max_concurrent: 10

session:
  # Session 不活跃超过此时间后自动清理
  ttl: 30m

  # 截断模式：turns（按轮数）/ tokens（按 Token 估算）
  truncate_mode: turns

  # truncate_mode=turns 时：保留最近 N 轮对话
  max_turns: 20

  # truncate_mode=tokens 时：保留的最大 Token 数（估算）
  max_tokens: 4000

log:
  # 日志级别：debug / info / warn / error
  level: info

  # 日志格式：text（人类可读）/ json（结构化，适合生产）
  format: text
